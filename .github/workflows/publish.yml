name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # needed for npm provenance
      packages: write   # needed for GitHub Packages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Upgrade npm to 11.5.1+ for OIDC trusted publishing support
      - run: npm install -g npm@latest

      # Publish to npm via OIDC Trusted Publisher — no NODE_AUTH_TOKEN, registry-url identifies the registry
      - run: npm publish --provenance

      # Publish to GitHub Packages
      - name: Publish to GitHub Packages
        run: |
          echo "@deveyus:registry=https://npm.pkg.github.com" > .npmrc.gh
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_PAT }}" >> .npmrc.gh
          npm publish --userconfig=.npmrc.gh --registry=https://npm.pkg.github.com
