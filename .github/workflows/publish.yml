name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # needed for OIDC trusted publishing
      packages: write   # needed for GitHub Packages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Publish to npm via OIDC Trusted Publisher (npm 11.x+ supports this natively)
      - run: npm publish --provenance

      # Publish to GitHub Packages
      - name: Publish to GitHub Packages
        run: |
          echo "@deveyus:registry=https://npm.pkg.github.com" > .npmrc.gh
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_PAT }}" >> .npmrc.gh
          npm publish --userconfig=.npmrc.gh --registry=https://npm.pkg.github.com
