name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # needed for OIDC trusted publishing
      packages: write   # needed for GitHub Packages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # Publish to npm via OIDC Trusted Publisher (npm 11.x+ supports this natively)
      - run: npm publish --provenance

      # Publish to GitHub Packages (GITHUB_TOKEN has packages:write permission)
      - name: Publish to GitHub Packages
        run: |
          npm pkg set name=@deveyus/mechflow
          npm publish --registry=https://npm.pkg.github.com
          npm pkg set name=mechflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
